<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <title>{% block title %}IPLpred{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=Outfit:wght@500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/static/css/app.css?v={{ asset_version }}" />
</head>
<body>
  <div class="bg-grid" aria-hidden="true"></div>
  <header class="site-header">
    <div class="container header-inner">
      <a href="/" class="brand">
        <span class="brand-mark">◆</span>
        <span class="brand-text">IPLpred</span>
      </a>
      <nav class="nav" aria-label="Main">
        <a href="/" class="nav-link{% if active == 'home' %} is-active{% endif %}">Home</a>
        <a href="/history" class="nav-link{% if active == 'history' %} is-active{% endif %}">Pred vs actual</a>
      </nav>
    </div>
  </header>
  <main class="main">
    <div class="container">
      {% block content %}{% endblock %}
    </div>
  </main>
  <footer class="site-footer">
    <div class="container footer-inner">
      <span>Read-only UI · predictions come from the CLI · UI build {{ ui_build_id }}</span>
      <a href="/health" class="footer-link">Status</a>
    </div>
  </footer>
</body>
</html>
